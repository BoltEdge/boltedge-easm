# docker-compose.yml
# Nano EASM — Production Stack
# Joins shared boltedge-network for Nginx routing

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  easm-db:
    image: postgres:16-alpine
    container_name: easm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-easm}
      POSTGRES_USER: ${DB_USER:-easm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - easm_postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-easm_user} -d ${DB_NAME:-easm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask Backend (Gunicorn) ─────────────────────────────────
  easm-backend:
    build: ./backend
    container_name: easm-backend
    restart: unless-stopped
    depends_on:
      easm-db:
        condition: service_healthy
    environment:
      SQLALCHEMY_DATABASE_URI: postgresql://${DB_USER:-easm_user}:${DB_PASSWORD}@easm-db:5432/${DB_NAME:-easm}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL:-https://nanoeasm.com}
      SHODAN_API_KEY: ${SHODAN_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MFA_SECRET_KEY: ${MFA_SECRET_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-Nano EASM <no-reply@nanoeasm.com>}
      MONITOR_EMAIL_FROM: ${MONITOR_EMAIL_FROM:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ENABLE_BILLING: ${ENABLE_BILLING:-false}
      FREE_UPGRADES_ENABLED: ${FREE_UPGRADES_ENABLED:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      # ── Cloudflare Turnstile (CAPTCHA) ────────────────────────
      # Verify_turnstile() is a no-op when this is unset, so leaving it
      # blank in dev is fine. Production must set both this AND the
      # frontend NEXT_PUBLIC_TURNSTILE_SITE_KEY.
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      # ── Stripe ───────────────────────────────────────────────
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_API_VERSION: ${STRIPE_API_VERSION:-2025-09-30.clover}
      STRIPE_PRICE_STARTER_MONTHLY: ${STRIPE_PRICE_STARTER_MONTHLY:-}
      STRIPE_PRICE_STARTER_ANNUAL: ${STRIPE_PRICE_STARTER_ANNUAL:-}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
      STRIPE_PRICE_PRO_ANNUAL: ${STRIPE_PRICE_PRO_ANNUAL:-}
      STRIPE_PRICE_SILVER_MONTHLY: ${STRIPE_PRICE_SILVER_MONTHLY:-}
      STRIPE_PRICE_SILVER_ANNUAL: ${STRIPE_PRICE_SILVER_ANNUAL:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://nanoeasm.com/settings/billing?checkout=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://nanoeasm.com/settings/billing?checkout=cancel}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-https://nanoeasm.com/settings/billing}
      # ── Agent Platform (Phase 1) ──────────────────────────────
      # Co-hosted multi-agent ops module at /admin/agents. The runtime
      # reads ANTHROPIC_API_KEY_AGENTS directly (no fallback); the send
      # service falls back from RESEND_TOKEN_AGENTS to RESEND_API_KEY.
      # NANOEASM_API_KEY_AGENTS_FOUNDER_OPS is issued via
      # `python -m scripts.issue_agent_key founder-ops read:stats`.
      ANTHROPIC_API_KEY_AGENTS: ${ANTHROPIC_API_KEY_AGENTS:-}
      RESEND_TOKEN_AGENTS: ${RESEND_TOKEN_AGENTS:-}
      FOUNDER_EMAIL: ${FOUNDER_EMAIL:-}
      AGENTS_FROM_EMAIL: ${AGENTS_FROM_EMAIL:-agents@nanoeasm.com}
      INTERNAL_API_BASE: ${INTERNAL_API_BASE:-http://easm-backend:5000}
      NANOEASM_API_KEY_AGENTS_FOUNDER_OPS: ${NANOEASM_API_KEY_AGENTS_FOUNDER_OPS:-}
    expose:
      - "5000"
    networks:
      - internal
      - boltedge-network

  # ── Next.js Frontend ─────────────────────────────────────────
  easm-frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED:-false}
        NEXT_PUBLIC_MICROSOFT_OAUTH_ENABLED: ${NEXT_PUBLIC_MICROSOFT_OAUTH_ENABLED:-false}
        NEXT_PUBLIC_ENABLE_BILLING: ${NEXT_PUBLIC_ENABLE_BILLING:-false}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    container_name: easm-frontend
    restart: unless-stopped
    depends_on:
      - easm-backend
    expose:
      - "3000"
    networks:
      - boltedge-network

# ── Networks ─────────────────────────────────────────────────
networks:
  internal:
    # Private network: backend ↔ database only
  boltedge-network:
    external: true
    # Shared network so Nginx can reach frontend + backend

# ── Volumes ──────────────────────────────────────────────────
volumes:
  easm_postgres_data: