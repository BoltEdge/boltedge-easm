<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Outside-in EASM diagram: an attacker view from the public internet on the left, a continuous scanner sweep moving across, and the organisation's external-facing assets on the right">
  <defs>
    <radialGradient id="orgGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(20,184,166,0.30)" />
      <stop offset="60%" stop-color="rgba(20,184,166,0.08)" />
      <stop offset="100%" stop-color="rgba(20,184,166,0)" />
    </radialGradient>
    <radialGradient id="orgCore2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(20,184,166,0)" />
      <stop offset="40%" stop-color="rgba(20,184,166,0.25)" />
      <stop offset="50%" stop-color="rgba(94,234,212,0.9)" />
      <stop offset="60%" stop-color="rgba(20,184,166,0.25)" />
      <stop offset="100%" stop-color="rgba(20,184,166,0)" />
    </linearGradient>
    <filter id="nodeGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dotGrid2" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="rgba(255,255,255,0.05)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="380" fill="url(#dotGrid2)" />

  <!-- LEFT side: the public internet (attacker viewpoint) -->
  <g transform="translate(170, 190)">
    <!-- A few rough nodes representing scanners / attackers on the internet -->
    <circle cx="-40" cy="-60" r="3" fill="rgba(255,255,255,0.20)" />
    <circle cx="-90" cy="-20" r="3" fill="rgba(255,255,255,0.20)" />
    <circle cx="-60" cy="40" r="3" fill="rgba(255,255,255,0.20)" />
    <circle cx="-100" cy="60" r="3" fill="rgba(255,255,255,0.20)" />
    <circle cx="-30" cy="80" r="3" fill="rgba(255,255,255,0.20)" />

    <!-- An "attacker eye" node -->
    <circle r="36" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.40)" stroke-width="1.5" />
    <circle r="36" fill="none" stroke="rgba(239,68,68,0.20)" stroke-width="1" filter="url(#nodeGlow2)" />
    <!-- Eye shape -->
    <path d="M -16 0 Q 0 -14 16 0 Q 0 14 -16 0 Z" fill="rgba(252,165,165,0.85)" />
    <circle cx="0" cy="0" r="5" fill="#0a1121" />
    <circle cx="0" cy="0" r="2.5" fill="rgba(252,165,165,0.95)" />

    <text y="-58" text-anchor="middle" fill="rgba(239,68,68,0.7)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.15em">THE PUBLIC INTERNET</text>
    <text y="70" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">An attacker's vantage</text>
  </g>

  <!-- SWEEP LINE — animated horizontal scan band moving right-to-left and back -->
  <g>
    <rect x="220" y="60" width="780" height="260" fill="url(#sweepGrad)" opacity="0.55">
      <animate attributeName="x" values="220;-200;220" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" />
    </rect>
  </g>

  <!-- Direction arrow labelled "continuous observation" -->
  <g transform="translate(600, 60)">
    <line x1="-180" y1="0" x2="180" y2="0" stroke="rgba(20,184,166,0.35)" stroke-width="1" stroke-dasharray="4 4" />
    <polygon points="180,0 172,-4 172,4" fill="rgba(20,184,166,0.5)" />
    <text y="-8" text-anchor="middle" fill="rgba(94,234,212,0.7)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.12em">CONTINUOUS OUTSIDE-IN OBSERVATION</text>
  </g>

  <!-- RIGHT side: the organisation with external-facing assets -->
  <g transform="translate(980, 190)">
    <circle r="120" fill="url(#orgGlow2)" />
    <!-- Perimeter dashed ring -->
    <circle r="95" fill="none" stroke="rgba(20,184,166,0.22)" stroke-width="1" stroke-dasharray="2 4" />

    <!-- Asset nodes on the perimeter -->
    <g filter="url(#nodeGlow2)">
      <circle cx="0" cy="-95" r="7" fill="#14b8a6" />
      <circle cx="82" cy="-48" r="7" fill="#14b8a6" />
      <circle cx="82" cy="48" r="7" fill="#14b8a6" />
      <circle cx="0" cy="95" r="7" fill="#14b8a6" />
      <circle cx="-82" cy="48" r="7" fill="#14b8a6" />
      <circle cx="-82" cy="-48" r="7" fill="#14b8a6" />
    </g>

    <!-- Asset labels next to each node -->
    <g fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">
      <text x="0" y="-110" text-anchor="middle">app.example.com</text>
      <text x="100" y="-46" text-anchor="start">api.example.com</text>
      <text x="100" y="52" text-anchor="start">mail.example.com</text>
      <text x="0" y="115" text-anchor="middle">cdn.example.com</text>
      <text x="-100" y="52" text-anchor="end">52.1.2.3</text>
      <text x="-100" y="-46" text-anchor="end">vpn.example.com</text>
    </g>

    <!-- Center: the org -->
    <circle r="30" fill="url(#orgCore2)" filter="url(#nodeGlow2)" />
    <circle r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <text y="5" text-anchor="middle" fill="#0a1121" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.05em">ORG</text>
  </g>

  <!-- Footer legend -->
  <g transform="translate(40, 350)">
    <text fill="rgba(255,255,255,0.40)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-style="italic">EASM continuously observes what the public internet can see — domains, subdomains, IPs, services, certificates — from the same vantage as an attacker.</text>
  </g>
</svg>
