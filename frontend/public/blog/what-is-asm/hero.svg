<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" role="img" aria-label="An attack surface visualization showing lit known assets on the inner ring and faint shadow assets on the outer ring, with the centre representing the organisation">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(20,184,166,0.30)" />
      <stop offset="60%" stop-color="rgba(20,184,166,0.08)" />
      <stop offset="100%" stop-color="rgba(20,184,166,0)" />
    </radialGradient>
    <radialGradient id="centerCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(20,184,166,0)" />
      <stop offset="50%" stop-color="rgba(20,184,166,0.35)" />
      <stop offset="100%" stop-color="rgba(20,184,166,0)" />
    </linearGradient>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="rgba(255,255,255,0.06)" />
    </pattern>
  </defs>

  <!-- Subtle dot grid background -->
  <rect x="0" y="0" width="1200" height="540" fill="url(#dotGrid)" />

  <!-- Center halo -->
  <circle cx="600" cy="270" r="240" fill="url(#centerGlow)" />

  <!-- Concentric reach rings -->
  <circle cx="600" cy="270" r="120" fill="none" stroke="rgba(20,184,166,0.22)" stroke-width="1" stroke-dasharray="2 4" />
  <circle cx="600" cy="270" r="195" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="1 3" />

  <!-- Connection lines from center to inner ring nodes (known assets) -->
  <g stroke="rgba(20,184,166,0.45)" stroke-width="1">
    <line x1="600" y1="270" x2="720" y2="270" />
    <line x1="600" y1="270" x2="660" y2="166" />
    <line x1="600" y1="270" x2="540" y2="166" />
    <line x1="600" y1="270" x2="480" y2="270" />
    <line x1="600" y1="270" x2="540" y2="374" />
    <line x1="600" y1="270" x2="660" y2="374" />
  </g>

  <!-- Faint connection lines from center to outer (some lit, some dashed for unknown reach) -->
  <g stroke="rgba(255,255,255,0.10)" stroke-width="0.75" stroke-dasharray="3 5">
    <line x1="600" y1="270" x2="795" y2="270" />
    <line x1="600" y1="270" x2="697" y2="100" />
    <line x1="600" y1="270" x2="503" y2="100" />
    <line x1="600" y1="270" x2="405" y2="270" />
    <line x1="600" y1="270" x2="503" y2="440" />
    <line x1="600" y1="270" x2="697" y2="440" />
  </g>

  <!-- Inner ring: KNOWN assets (teal, lit) -->
  <g filter="url(#nodeGlow)">
    <circle cx="720" cy="270" r="9" fill="#14b8a6" />
    <circle cx="660" cy="166" r="9" fill="#14b8a6" />
    <circle cx="540" cy="166" r="9" fill="#14b8a6" />
    <circle cx="480" cy="270" r="9" fill="#14b8a6" />
    <circle cx="540" cy="374" r="9" fill="#14b8a6" />
    <circle cx="660" cy="374" r="9" fill="#14b8a6" />
  </g>

  <!-- Outer ring: UNKNOWN / shadow assets (dim, no glow) -->
  <g>
    <circle cx="795" cy="270" r="7" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1" />
    <circle cx="697" cy="100" r="7" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1" />
    <circle cx="503" cy="100" r="7" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1" />
    <circle cx="405" cy="270" r="7" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1" />
    <circle cx="503" cy="440" r="7" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1" />
    <circle cx="697" cy="440" r="7" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1" />
  </g>

  <!-- A couple of "newly-discovered" pulse markers on the outer ring -->
  <circle cx="795" cy="270" r="14" fill="none" stroke="rgba(20,184,166,0.4)" stroke-width="1">
    <animate attributeName="r" from="9" to="24" dur="2.2s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.6" to="0" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="503" cy="440" r="14" fill="none" stroke="rgba(20,184,166,0.4)" stroke-width="1">
    <animate attributeName="r" from="9" to="24" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" from="0.6" to="0" dur="2.5s" repeatCount="indefinite" />
  </circle>

  <!-- Center core: the organisation -->
  <circle cx="600" cy="270" r="32" fill="url(#centerCore)" filter="url(#nodeGlow)" />
  <circle cx="600" cy="270" r="32" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <text x="600" y="276" text-anchor="middle" fill="#0a1121" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.05em">ORG</text>

  <!-- Legend -->
  <g transform="translate(40, 470)">
    <circle cx="8" cy="8" r="6" fill="#14b8a6" filter="url(#nodeGlow)" />
    <text x="22" y="13" fill="rgba(255,255,255,0.75)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500">Known assets</text>

    <circle cx="170" cy="8" r="5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1" />
    <text x="184" y="13" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500">Shadow / unmonitored</text>

    <circle cx="380" cy="8" r="6" fill="none" stroke="rgba(20,184,166,0.7)" stroke-width="1.5" />
    <text x="394" y="13" fill="rgba(94,234,212,0.85)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500">Newly discovered (ASM)</text>
  </g>
</svg>
