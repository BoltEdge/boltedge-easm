<!DOCTYPE html>
<!--
  Source for the LinkedIn company-page cover image at
  frontend/scripts/linkedin-cover.png. Not served by Next.js — this is
  a static asset for upload to the LinkedIn admin console.

  Dimensions: 1584 × 396 (LinkedIn's current banner spec, 4:1 ratio).
  LinkedIn overlays the company profile picture as a circular avatar
  along the bottom-left. The wordmark sits in the upper-left and the
  copy is centred vertically + horizontally so the avatar overlap
  doesn't hide anything important.

  Regenerate with:
    chrome --headless=new --disable-gpu --hide-scrollbars \
      --window-size=1584,396 \
      --screenshot=frontend/scripts/linkedin-cover.png \
      file:///<abs-path>/frontend/scripts/linkedin-cover.html

  At 396px tall the viewport is comfortably above Chrome's minimum,
  so no post-crop step is required (unlike the 1128×191 version).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nano EASM — LinkedIn Cover</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1584px;
    height: 396px;
    overflow: hidden;
    background: #020617;
  }
  body {
    position: relative;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
    color: #f8fafc;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Subtle teal radial glows on both edges — same brand system as the
     OG image. The right glow is slightly stronger so the eye is
     pulled to that side first, away from the avatar overlay area. */
  .glow-right {
    position: absolute;
    width: 1100px;
    height: 1100px;
    right: -380px;
    top: -440px;
    background: radial-gradient(circle, rgba(20,184,166,0.22) 0%, rgba(20,184,166,0.06) 35%, rgba(20,184,166,0) 65%);
    pointer-events: none;
    z-index: 0;
  }
  .glow-left {
    position: absolute;
    width: 760px;
    height: 760px;
    left: -260px;
    bottom: -380px;
    background: radial-gradient(circle, rgba(20,184,166,0.10) 0%, rgba(20,184,166,0) 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Faint dot/line grid — masked so it fades toward the edges. */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(148,163,184,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,0.05) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 80% 100% at 60% 50%, black 30%, transparent 90%);
            mask-image: radial-gradient(ellipse 80% 100% at 60% 50%, black 30%, transparent 90%);
    z-index: 0;
    pointer-events: none;
  }

  /* Logo lockup — anchored to top-left so the bottom-left avatar
     overlay area stays clear. */
  .logo {
    position: absolute;
    top: 44px;
    left: 80px;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo .icon {
    width: 60px;
    height: 60px;
    border-radius: 13px;
    background: #0a0f1e;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 1px rgba(20,184,166,0.18), 0 10px 28px rgba(20,184,166,0.18);
  }
  .logo .icon svg { width: 38px; height: 38px; display: block; }
  .logo .word {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.8px;
    color: #f8fafc;
    line-height: 1;
  }
  .logo .word .accent { color: #14b8a6; }

  /* URL block in the top-right corner — small but readable. */
  .url {
    position: absolute;
    top: 56px;
    right: 80px;
    z-index: 1;
    text-align: right;
    line-height: 1.2;
  }
  .url .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.4px;
    color: rgba(148,163,184,0.7);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .url .domain {
    font-size: 18px;
    color: #14b8a6;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* Centre block — eyebrow + headline + subhead. Vertically centred
     within the full canvas; horizontally centred. */
  .copy {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
    text-align: center;
    padding: 0 60px;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(20,184,166,0.08);
    border: 1px solid rgba(20,184,166,0.28);
    color: #5eead4;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .eyebrow .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: #14b8a6;
    box-shadow: 0 0 9px #14b8a6;
  }
  .headline {
    font-size: 60px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    color: #f8fafc;
    margin-bottom: 18px;
    white-space: nowrap;
  }
  .headline .accent { color: #14b8a6; }
  .sub {
    font-size: 22px;
    line-height: 1.4;
    color: #94a3b8;
    font-weight: 400;
    letter-spacing: 0.4px;
  }
  .sub .dot {
    display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(148,163,184,0.6);
    vertical-align: middle;
    margin: 0 12px 3px;
  }

  /* Tagline at the bottom-centre — subtle but reinforces position. */
  .tagline {
    position: absolute;
    bottom: 44px;
    left: 0;
    right: 0;
    z-index: 1;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.4px;
    color: rgba(148,163,184,0.55);
  }
</style>
</head>
<body>
  <div class="glow-right"></div>
  <div class="glow-left"></div>
  <div class="grid"></div>

  <div class="logo">
    <div class="icon">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.5 4L9.5 17H14.5L13 28L21.5 14.5H16L17.5 4Z" fill="#14b8a6"/>
      </svg>
    </div>
    <div class="word">Nano<span class="accent">EASM</span></div>
  </div>

  <div class="url">
    <div class="label">Visit</div>
    <div class="domain">nanoeasm.com</div>
  </div>

  <div class="copy">
    <div class="eyebrow"><span class="pulse"></span>Continuous external exposure</div>
    <div class="headline">External <span class="accent">Attack&nbsp;Surface</span> Management</div>
    <div class="sub">
      Discover<span class="dot"></span>Prioritise<span class="dot"></span>Monitor<span class="dot"></span>Remediate
    </div>
  </div>

  <div class="tagline">
    The external exposure foundation for continuous threat exposure management.
  </div>
</body>
</html>
