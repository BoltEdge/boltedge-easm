name: tests
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: easm_user
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: easm
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Bootstrap DB schema from models
        working-directory: backend
        env:
          FLASK_APP: run.py
          SQLALCHEMY_DATABASE_URI: postgresql://easm_user:testpass@localhost:5432/easm
          SECRET_KEY: local-dev-secret-key-tests
          CORS_ORIGINS: http://localhost:3000
          ENABLE_BILLING: "false"
        # Migrations chain has a pre-existing root bug (the first migration
        # references the organization table which no migration creates —
        # historically the base schema was bootstrapped via db.create_all
        # and only later changes were captured as migrations). CI starts
        # from an empty DB so we go the same route: create_all from models,
        # then stamp alembic head so the version table is populated for
        # any future incremental migrations the suite might exercise.
        run: |
          python -c "from app import create_app; app = create_app(); ctx = app.app_context(); ctx.push(); from app.extensions import db; db.create_all(); print('schema bootstrapped from models')"
          flask db stamp head
      - name: Run pytest
        working-directory: backend
        env:
          FLASK_APP: run.py
          SQLALCHEMY_DATABASE_URI: postgresql://easm_user:testpass@localhost:5432/easm
          SECRET_KEY: local-dev-secret-key-tests
          CORS_ORIGINS: http://localhost:3000
          ENABLE_BILLING: "false"
        run: pytest tests/ -v
